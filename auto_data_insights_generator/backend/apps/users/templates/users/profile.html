{% extends 'base.html' %}
{% block title %}Profile - {{ user.username }}{% endblock %}

{% block content %}
<div class="page-container">
    <div class="profile-card glass-card">
        <div class="profile-header">
            <div class="profile-avatar">
                {% if profile.profile_picture %}
                    <img src="{{ profile.profile_picture.url }}" alt="Profile Picture">
                {% else %}
                    <div class="avatar-placeholder">
                        <span>{{ user.username|first|upper }}</span>
                    </div>
                {% endif %}
            </div>
            <h2>{{ user.username }}</h2>
            <span class="role-badge">{{ profile.get_role_display }}</span>
        </div>

        <form method="post" enctype="multipart/form-data" class="profile-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" rows="3" class="form-control" placeholder="Tell us about yourself...">{{ profile.bio }}</textarea>
            </div>
            <div class="form-group">
                <label for="organization">Organization</label>
                <input type="text" id="organization" name="organization" class="form-control" value="{{ profile.organization }}" placeholder="Your company or team">
            </div>
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" class="form-control">
                    <option value="analyst" {% if profile.role == 'analyst' %}selected{% endif %}>Data Analyst</option>
                    <option value="manager" {% if profile.role == 'manager' %}selected{% endif %}>Manager</option>
                    <option value="viewer" {% if profile.role == 'viewer' %}selected{% endif %}>Viewer</option>
                </select>
            </div>
            <div class="form-group">
                <label for="profile_picture">Profile Picture</label>
                <input type="file" id="profile_picture" name="profile_picture" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="icon">💾</i> Save Profile
            </button>
        </form>
    </div>
</div>
{% endblock %}
